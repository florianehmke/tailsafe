---
name: release

'on':
  push:
    tags:
      - v*.*.*

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: docker/setup-buildx-action@v3
      - name: Run TailSafe CI
        run: ./.cicd/scripts/ci.sh

  publish:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: tailsafe-configurator
            dockerfile: containers/configurator/Dockerfile
          - image: tailsafe-backrest
            dockerfile: containers/backrest/Dockerfile
          - image: tailsafe-rest-server
            dockerfile: containers/rest-server/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: >-
            ghcr.io/${{ github.repository_owner }}/tailsafe/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
