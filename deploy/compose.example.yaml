---
services:
  configurator:
    image: ${TAILSAFE_IMAGE_NAMESPACE}/tailsafe-configurator:${TAILSAFE_VERSION}
    env_file:
      - ${TAILSAFE_COMPOSE_ENV_FILE:-../.env}
    environment:
      TAILSAFE_SITE_CONFIG: /input/site.json
      TAILSAFE_GENERATED_DIR: /generated
    volumes:
      - ${BACKREST_DATA_ROOT}/generated:/generated
      - ${SITE_CONFIG_PATH}:/input/site.json:ro
    restart: "no"

  tailscale-outbound:
    image: tailscale/tailscale:${TAILSCALE_DOCKER_TAG}
    environment:
      TS_AUTHKEY: ${TS_OUTBOUND_AUTHKEY}
      TS_AUTH_ONCE: "true"
      TS_HOSTNAME: ${TS_OUTBOUND_HOSTNAME}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "true"
      TS_OUTBOUND_HTTP_PROXY_LISTEN: :1055
      TS_EXTRA_ARGS: --accept-dns=false
    volumes:
      - ${TAILSAFE_STATE_ROOT}/outbound:/var/lib/tailscale
    networks:
      - tailsafe-outbound
    restart: unless-stopped

  backrest:
    image: ${TAILSAFE_IMAGE_NAMESPACE}/tailsafe-backrest:${TAILSAFE_VERSION}
    depends_on:
      configurator:
        condition: service_completed_successfully
      tailscale-outbound:
        condition: service_started
    environment:
      BACKREST_PORT: 0.0.0.0:9898
      BACKREST_CONFIG: /generated/backrest-config.json
      BACKREST_DATA: /data
      XDG_CACHE_HOME: /cache
      TMPDIR: /tmp
      TZ: ${TZ}
      RESTIC_REPOSITORY_PASSWORD: ${RESTIC_REPOSITORY_PASSWORD}
      HTTP_PROXY: http://tailscale-outbound:1055
      HTTPS_PROXY: http://tailscale-outbound:1055
      http_proxy: http://tailscale-outbound:1055
      https_proxy: http://tailscale-outbound:1055
      NO_PROXY: 127.0.0.1,localhost,hc-ping.com
      no_proxy: 127.0.0.1,localhost,hc-ping.com
    volumes:
      - ${BACKREST_DATA_ROOT}/generated:/generated
      - ${BACKREST_DATA_ROOT}/data:/data
      - ${BACKREST_DATA_ROOT}/cache:/cache
      - ${BACKREST_DATA_ROOT}/tmp:/tmp
      - ${USERDATA_ROOT}:/userdata:ro
    ports:
      - "127.0.0.1:${BACKREST_BIND_PORT}:9898"
    networks:
      - tailsafe-outbound
    restart: unless-stopped

networks:
  tailsafe-outbound:
    driver: bridge
